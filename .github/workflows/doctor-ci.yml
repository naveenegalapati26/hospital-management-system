name: Doctor Service CI

on:
  push:
    branches:
        - main
             - develop

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: doctor-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests
